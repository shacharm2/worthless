  <style>
    :root {
      --bg: #eef6ff;
      --surface: #ffffff;
      --border: #dde5f0;
      --text: #2c3a4a;
      --text2: #6c7e95;
      --slate: #4a6fa5;
      --slate-dim: #3a5a8a;
      --teal: #0a9396;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(to bottom, #daeeff 0%, #eef6ff 20%, #ffffff 45%, #ffffff 55%, #eef6ff 75%, #daeeff 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: left;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--teal);
      margin-bottom: 2.5rem;
    }

    .what {
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      margin-bottom: 2.5rem;
    }

    .what-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--teal);
      margin-bottom: 0.75rem;
    }

    .what p {
      font-size: 1rem;
      color: var(--text2);
      line-height: 1.8;
    }

    .waitlist-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .waitlist-form input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }

    .waitlist-form input:focus {
      border-color: var(--slate);
    }

    .waitlist-form input::placeholder {
      color: var(--text2);
    }

    .waitlist-form button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      background: var(--slate);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .waitlist-form button:hover {
      background: var(--slate-dim);
    }

    .waitlist-success {
      font-size: 0.95rem;
      color: var(--teal);
      margin-bottom: 1rem;
    }

    .waitlist-success a {
      color: var(--slate);
      font-weight: 600;
    }

    .btn-waitlist {
      display: inline-block;
      padding: 0.75rem 1.8rem;
      background: var(--slate);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: var(--radius);
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }

    .btn-waitlist:hover {
      background: var(--slate-dim);
    }

    .coming-soon {
      font-size: 0.8rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      font-size: 0.85rem;
    }

    .links a {
      color: var(--text2);
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: var(--text);
    }

    @media (max-width: 520px) {
      .waitlist-form {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="logo">
        <img src="logo-transparent.png" alt="Worthless logo" />
      </div>
      <h1>Worthless</h1>
    </div>
    <p class="tagline">Your API key gets leaked. Or stolen. Doesn't matter. It won't work. It's Worthless.</p>

    <a href="https://tally.so/r/WOpNVL" target="_blank" rel="noopener" class="btn-waitlist">Join the waitlist</a>

    <a href="memes.html" class="coming-soon" style="text-decoration: none; display: block;">Leaking soon</a>

  </div>
