[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "worthless"
version = "0.1.0"
description = "Split-key reverse proxy that makes API keys architecturally worthless to steal"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.28",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.hatch.build.targets.wheel]
packages = ["src/worthless"]

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
]
