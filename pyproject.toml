[project]
name = "worthless"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=46.0.5",
    "aiosqlite>=0.22.1",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
]
test = [
    "pytest",
    "pytest-asyncio",
    "pytest-benchmark",
    "pytest-console-scripts",
    "pytest-cov",
    "pytest-randomly",
    "pytest-timeout",
    "pytest-xdist",
    "hypothesis",
    "respx",
    "syrupy",
]
qa = [
    "schemathesis",
    "mutmut",
]
fuzz = [
    "atheris",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-config --strict-markers"
markers = [
    "benchmark: performance and latency regression checks",
    "contract: schema-driven API and protocol checks",
    "snapshot: request/response and stream shape snapshot checks",
]

[tool.coverage.run]
branch = true
source = ["worthless"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff.lint]
select = ["E", "F", "W", "TID"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"random".msg = "Use the 'secrets' module for cryptographic randomness. The 'random' module is banned (CRYP-04)."
