# Gitleaks config — extends default rules with SR-05 denylist patterns
# Ref: CONTRIBUTING-security.md SR-04, SR-05

[extend]
useDefault = true

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-[A-Za-z0-9_-]{20,}'''
keywords = ["sk-"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''anthropic-[A-Za-z0-9_-]{20,}'''
keywords = ["anthropic-"]

[[rules]]
id = "google-api-key"
description = "Google AI API key"
regex = '''AIza[A-Za-z0-9_-]{30,}'''
keywords = ["AIza"]

[[rules]]
id = "xai-api-key"
description = "xAI API key"
regex = '''xai-[A-Za-z0-9_-]{20,}'''
keywords = ["xai-"]

[[rules]]
id = "long-base64-secret"
description = "Long base64 string in security context (SR-05)"
regex = '''(?i)(?:secret|token|key|credential|password|shard)\s*[:=]\s*["']?[A-Za-z0-9+/]{33,}={0,2}["']?'''

[allowlist]
paths = [
    '''\.gitleaks\.toml$''',
    '''CONTRIBUTING-security\.md$''',
    '''docs/security\.md$''',
    '''\.planning/research/.*\.md$''',
    '''\.planning/snapshots/.*\.json$''',
    '''\.planning/ROADMAP\.md$''',
    '''tests/.*\.py$''',
    '''tests/.*\.sh$''',
]
# Public install docs (website/install-*.md) show sample `worthless status`
# output with placeholder provider aliases like `anthropic-a1b2c3d4`.
# Exempt ONLY that exact placeholder shape — provider name + exactly 8 hex
# digits — matched against the whole source line. A real key (sk-..., AIza...,
# 20+ chars) cannot match this, so real secrets pasted into install docs are
# still caught. This is a regexes allowlist, NOT a path allowlist: an earlier
# WOR-306 merge fix allowlisted all of website/install-*.md by path, which
# suppressed every rule there (caught in security review — HIGH).
# gitleaks v8.24 uses the RE2 engine — no lookahead. \b (exactly-8-hex
# word boundary) replaces an unsupported (?!\w): it still rejects the
# 8-char prefix of any longer real key (e.g. a 20+ char xai-... key).
regexTarget = "line"
# - First regex: placeholder provider aliases in public install docs (see above).
# - Second regex: SonarCloud's public `sonar.projectKey` identifier. It contains
#   the word "key" and trips gitleaks' default generic-api-key rule, but it is a
#   public project slug (visible in any SonarCloud badge), not a secret. Exempt
#   ONLY that exact line rather than path-allowlisting the whole file, which would
#   suppress every rule there (the over-broad-path mistake documented above).
regexes = [
    '''(?i)(?:openai|anthropic|google|xai)-[a-f0-9]{8}\b''',
    '''sonar\.projectKey''',
]
