name: Tests

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (ubuntu, py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run test suite
        env:
          UV_CACHE_DIR: /tmp/uv-cache
          HYPOTHESIS_PROFILE: ci
        run: |
          uv sync --extra dev --extra test
          uv run pytest --reruns 1 --cov=worthless --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -n auto --dist loadscope -x

      - name: Lint
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run ruff check .

      - name: Type check
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run pyright

      - name: Dead code (vulture)
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run vulture src/ --min-confidence 80

      - name: Complexity (xenon)
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run xenon src/ --max-absolute C --max-modules B --max-average A

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-xml
          include-hidden-files: true
          path: |
            coverage.xml
            .coverage
          retention-days: 5

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! REPORT=$(uv run coverage report --skip-covered --skip-empty); then
            echo "::warning::coverage report failed (exit $?)"
            exit 0
          fi
          TOTAL=$(echo "$REPORT" | tail -1 | awk '{print $NF}')
          if ! [[ "$TOTAL" =~ ^[0-9]+%$ ]]; then
            echo "::warning::Could not parse coverage total: '$TOTAL'"
            exit 0
          fi
          {
            echo "<!-- worthless-coverage-bot -->"
            echo "### Coverage Report"
            echo "**Total line coverage: ${TOTAL}**"
            echo "<details><summary>Per-package breakdown</summary>"
            echo ""
            echo '```'
            echo "$REPORT"
            echo '```'
            echo "</details>"
          } > /tmp/cov-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/cov-comment.md --edit-last || \
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/cov-comment.md

  coverage-gate:
    name: Per-module coverage gate
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-xml

      - name: Check per-module coverage floors
        run: python scripts/check-coverage-floors.py

  quarantine:
    name: Quarantine tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run quarantined tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test
          uv run pytest -m quarantine --reruns 1 -v || true
