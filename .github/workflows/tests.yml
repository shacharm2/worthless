name: Tests

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && fromJson('["3.13"]') || github.event_name == 'pull_request' && fromJson('["3.10", "3.13"]') || fromJson('["3.10", "3.11", "3.12", "3.13"]') }}
      fail-fast: false
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite
        env:
          UV_CACHE_DIR: /tmp/uv-cache
          HYPOTHESIS_PROFILE: ci
          # Real-sidecar tests Popen a Python interpreter and wait for
          # the AF_UNIX socket to bind. Cold-start on ubuntu-latest under
          # xdist load occasionally exceeds the 5.0s prod default; bump
          # to 20s so a slow runner doesn't masquerade as a regression.
          WORTHLESS_SIDECAR_READY_TIMEOUT_SECS: "20"
        run: |
          uv sync --extra dev --extra test --extra mcp
          # Parallel pass — everything EXCEPT the real-subprocess sidecar/IPC
          # family. Coverage is accumulated, not gated here. Quarantined flaky
          # tests are excluded from the gating run (WOR-578).
          uv run pytest --reruns 1 --cov=worthless --cov-report=xml --cov-report=term-missing -n auto --dist loadscope -x -m "not live and not docker and not user_flow and not real_ipc and not quarantine"
          # Serial pass — real_ipc tests that spawn real processes/sidecars;
          # kept serial because subprocess.run(waitpid) + PEP 475 EINTR-retry
          # makes pytest-timeout ineffective for these tests under xdist.
          # `--cov-append` rolls coverage into total; `--cov-fail-under` gates.
          uv run pytest --reruns 1 --cov=worthless --cov-append --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -n0 -m "real_ipc and not live and not docker and not quarantine"

      - name: Lint
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run ruff check .

      - name: Type check
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run pyright

      - name: Dead code (vulture)
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run vulture src/ --min-confidence 80

      - name: Complexity (xenon)
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv run xenon src/ --max-absolute C --max-modules B --max-average A

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          include-hidden-files: true
          path: |
            coverage.xml
            .coverage
          retention-days: 5

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! REPORT=$(uv run coverage report --skip-covered --skip-empty); then
            echo "::warning::coverage report failed (exit $?)"
            exit 0
          fi
          TOTAL=$(echo "$REPORT" | tail -1 | awk '{print $NF}')
          if ! [[ "$TOTAL" =~ ^[0-9]+%$ ]]; then
            echo "::warning::Could not parse coverage total: '$TOTAL'"
            exit 0
          fi
          {
            echo "<!-- worthless-coverage-bot -->"
            echo "### Coverage Report"
            echo "**Total line coverage: ${TOTAL}**"
            echo "<details><summary>Per-package breakdown</summary>"
            echo ""
            echo '```'
            echo "$REPORT"
            echo '```'
            echo "</details>"
          } > /tmp/cov-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/cov-comment.md --edit-last || \
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/cov-comment.md

  test-macos:
    name: Test (macos, py3.13)
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: "3.13"

      # macOS runner minutes bill at ~10x Linux, so we run only the storage /
      # lock / MCP unit files this WOR-646 work touches — enough to prove the
      # DB + rotation-cleanup + MCP-reconcile logic is OS-agnostic, without
      # paying 10x for the whole suite. Linux remains the full-matrix gate.
      - name: Run storage/lock/MCP unit tests on macOS
        env:
          UV_CACHE_DIR: /tmp/uv-cache
          HYPOTHESIS_PROFILE: ci
          WORTHLESS_SIDECAR_READY_TIMEOUT_SECS: "20"
        run: |
          uv sync --extra dev --extra test --extra mcp
          uv run pytest -n auto --dist loadscope \
            tests/test_lock_write_invariants.py \
            tests/test_lock_sigint_atomicity.py \
            tests/test_mcp_server.py \
            tests/test_storage.py \
            tests/test_storage_ipc.py \
            -m "not live and not docker and not user_flow and not real_ipc and not quarantine"

  coverage-gate:
    name: Per-module coverage gate
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-xml-py3.13

      - name: Check per-module coverage floors
        run: python scripts/check-coverage-floors.py

  sonarcloud:
    name: SonarCloud Scan
    needs: test
    # Skip on Dependabot PRs: GitHub withholds Actions secrets (incl. SONAR_TOKEN)
    # from Dependabot-triggered runs, so the scan can only fail there (worthless-uw3o).
    if: github.repository == 'oblangatas/worthless' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          persist-credentials: false

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-xml-py3.13

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            ${{ github.event_name == 'pull_request'
            && format(
              '-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}',
              github.event.pull_request.number,
              github.head_ref,
              github.base_ref)
            || '' }}


  smoke-windows:
    name: Smoke (windows, py3.13)
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Smoke test
        run: |
          uv sync --extra dev --extra test
          uv run worthless --version
          uv run worthless --help
          uv run pytest tests/test_platform.py tests/test_cli_down.py -v -k "not Integration" -o "addopts="

  quarantine:
    name: Quarantine tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Run quarantined tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test
          uv run pytest -m quarantine --reruns 1 -v || true
