name: Tests

# Keep the default PR gate ubuntu-only while the repo is private so CI stays
# within the included GitHub Actions minutes.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest (ubuntu, py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run test suite
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra test
          uv run pytest
