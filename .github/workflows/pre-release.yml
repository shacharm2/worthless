name: Pre-release

on:
  push:
    tags:
      # Pre-release qualifiers only: v1.2.3rc1, v1.2.3a1, v1.2.3b2, v1.2.3-rc1, v1.2.3-beta1.
      # Final release tags (v1.2.3) are excluded so pre-release CI doesn't produce
      # spurious red checks on every published release.
      - "v*rc*"
      - "v*a*"
      - "v*b*"
      - "v*-rc*"
      - "v*-alpha*"
      - "v*-beta*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-mutation:
    name: Full mutation testing
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run mutmut on crypto and proxy
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test --extra qa
          uv run python -m mutmut run --paths-to-mutate src/worthless/crypto --paths-to-mutate src/worthless/proxy

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run pip-audit
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra qa
          uv run pip-audit

  full-test:
    name: Full test suite with coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run full test suite
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test
          uv run pytest --cov=worthless --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Check per-module coverage floors
        run: uv run python scripts/check-coverage-floors.py
