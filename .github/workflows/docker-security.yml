name: Docker Security Scan

on:
  push:
    paths:
      - 'Dockerfile'
      - 'deploy/**'
      - 'pyproject.toml'
      - 'src/**'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'deploy/**'
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC — check if ignored CVEs have fixes

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t worthless-proxy:${{ github.sha }} .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        env:
          TRIVY_IGNOREFILE: .trivyignore
        with:
          image-ref: worthless-proxy:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

      - name: Trivy full scan (no ignore — check for new fixes)
        if: github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: worthless-proxy:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table

      - name: Dockle best-practice lint
        uses: erzz/dockle-action@69369bc745ee29813f730231a821bcd4f71cd290 # v1
        with:
          image: worthless-proxy:${{ github.sha }}
          exit-code: "1"
          failure-threshold: WARN
