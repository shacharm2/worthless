name: Docker Security Scan & E2E

on:
  push:
    paths:
      - 'Dockerfile'
      - 'deploy/**'
      - 'pyproject.toml'
      - 'src/**'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'deploy/**'
      - 'tests/test_docker_e2e.py'
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC — check if ignored CVEs have fixes

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t worthless-proxy:${{ github.sha }} .

      # Grype (Anchore) replaces Trivy (Aqua) after the TeamPCP supply-chain
      # compromise of aquasecurity/trivy-action in Feb-Mar 2026. Same
      # archetype (OSS, OS-pkg + language-dep coverage), different vendor
      # and codebase, currently clean.
      - name: Grype vulnerability scan (fixable only, fail on HIGH+)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: worthless-proxy:${{ github.sha }}
          severity-cutoff: high
          only-fixed: true
          fail-build: true

      - name: Grype full scan (including unfixed — informational)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: worthless-proxy:${{ github.sha }}
          severity-cutoff: high
          only-fixed: false
          fail-build: false

      - name: Dockle best-practice lint
        # ``.dockleignore`` in the repo root skips CIS-DI-0001 (image
        # runs root by default — INTENTIONAL for WOR-310's priv-drop
        # entrypoint).  See the .dockleignore comments for full
        # rationale.  Dockle reads .dockleignore from CWD, which is
        # the checkout root inside the action runner.
        uses: erzz/dockle-action@69369bc745ee29813f730231a821bcd4f71cd290 # v1
        with:
          image: worthless-proxy:${{ github.sha }}
          exit-code: "1"
          failure-threshold: WARN

  docker-e2e:
    runs-on: ubuntu-latest
    needs: scan  # reuses the scan job's checkout; image rebuilt (no cache sharing across jobs)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t worthless-proxy:test .

      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run Docker E2E tests
        run: uv run pytest tests/test_docker_e2e.py -v -m docker --tb=short
        env:
          WORTHLESS_DOCKER_IMAGE: worthless-proxy:test

      - name: Run OpenClaw/Compose E2E tests
        run: uv run pytest tests/test_openclaw_e2e.py -v -m openclaw --tb=short --timeout=360
