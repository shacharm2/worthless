name: Docker Security Scan & E2E

on:
  push:
    paths:
      - 'Dockerfile'
      - 'deploy/**'
      - 'pyproject.toml'
      - 'src/**'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'deploy/**'
      - 'tests/test_docker_e2e.py'
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC — check if ignored CVEs have fixes

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t worthless-proxy:${{ github.sha }} .

      - name: Trivy vulnerability scan (fixable only)
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: worthless-proxy:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          ignore-unfixed: "true"

      - name: Trivy full scan (including unfixed — informational)
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: worthless-proxy:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table

      - name: Dockle best-practice lint
        uses: erzz/dockle-action@69369bc745ee29813f730231a821bcd4f71cd290 # v1
        with:
          image: worthless-proxy:${{ github.sha }}
          exit-code: "1"
          failure-threshold: WARN

  docker-e2e:
    runs-on: ubuntu-latest
    needs: scan  # reuses the scan job's checkout; image rebuilt (no cache sharing across jobs)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t worthless-proxy:test .

      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5
        with:
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run Docker E2E tests
        run: uv run pytest tests/test_docker_e2e.py -v -m docker --tb=short
        env:
          WORTHLESS_DOCKER_IMAGE: worthless-proxy:test

      - name: Run OpenClaw/Compose E2E tests
        run: uv run pytest tests/test_openclaw_e2e.py -v -m openclaw --tb=short --timeout=360
