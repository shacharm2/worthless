name: Publish to PyPI

on:
  # LOAD-BEARING: push-tags-only. Do NOT add workflow_dispatch or
  # workflow_call — the GPG signed-tag verify step in the build job is
  # guarded on `github.event_name == 'push'`, so any other trigger would
  # publish to PyPI WITHOUT a signature check. tests/test_deploy_static.py
  # (TestPublishTagVerification) enforces this.
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need full history so `git verify-tag` can read the signed tag
          # object; a shallow clone strips signatures (mirrors deploy-worker.yml).
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag GPG signature (fatal — must precede pyproject parse + build)
        # FIRST step after checkout, BY DESIGN. PyPI must publish only from a
        # tag the maintainer GPG-signed: deploy-worker.yml already fails closed
        # on an unsigned tag; this closes the same gap on the publish side.
        # It must run BEFORE the next step (which parses attacker-controlled
        # pyproject.toml) and before `python -m build` (which runs build hooks).
        # Reuses the same verify-tag.sh + repo Variables as deploy-worker.yml.
        if: github.event_name == 'push'
        env:
          MAINTAINER_PUBKEY: ${{ vars.MAINTAINER_GPG_PUBKEY }}
          MAINTAINER_FINGERPRINT: ${{ vars.MAINTAINER_GPG_FINGERPRINT }}
        run: bash .github/scripts/verify-tag.sh

      - name: Verify tag matches pyproject version
        # Single sync invariant in the resolve-latest install.sh model:
        # pushed git tag MUST equal the version pinned in pyproject.toml.
        # Without this guard, `skip-existing: true` (set on the publish step)
        # silently dupe-accepts a stale-version build on every v* tag — the
        # exact bug WOR-300 hit on v0.3.1 / v0.3.1-rc1 (pyproject said 0.3.0,
        # tag said 0.3.1, PyPI accepted-and-discarded the duplicate). Failing
        # fast here makes the desync impossible.
        #
        # Uses tomllib (Python 3.11+, available system-wide on ubuntu-latest
        # runners) instead of grep+sed, so dynamic versioning, comments, or
        # multi-line strings in pyproject.toml don't yield false-positive
        # matches.
        run: |
          set -euo pipefail
          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${PYPROJECT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error title=Tag/pyproject version drift::Pushed tag ${GITHUB_REF_NAME} (=> ${TAG_VERSION}) does not match pyproject.toml version ${PYPROJECT_VERSION}. Bump pyproject.toml first or push a matching tag."
            exit 1
          fi
          echo "OK: tag ${GITHUB_REF_NAME} matches pyproject ${PYPROJECT_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --disable-pip-version-check build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: pypi
    permissions:
      id-token: write  # Scoped to publish job only (OIDC for trusted publishing)

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
          attestations: true
          # Idempotent: if the version already exists on PyPI (e.g. when a
          # canonical tag is pushed after a successful pre-release upload),
          # skip the upload and exit clean instead of failing the workflow.
          skip-existing: true
