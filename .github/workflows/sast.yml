name: SAST

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Run bandit
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra qa
          uv run bandit -c pyproject.toml -r src/ -l -ii --format sarif --output bandit.sarif || true
          python -c "import json,sys; d=json.load(open('bandit.sarif')); errs=[r for r in d.get('runs',[{}])[0].get('results',[]) if r.get('level')=='error']; sys.exit(1) if errs else None"

      - name: Upload Bandit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c # v3
        with:
          sarif_file: bandit.sarif
          category: bandit

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Run semgrep
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra qa
          uv run semgrep scan --config auto --config p/secrets --config p/security-audit --config .semgrep/ src/ --sarif --output semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@44c470ffc35caa8b1eb3e8012ca53c2f9bea4eb5 # v2
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  actionlint:
    name: Actionlint (workflow linter)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install and run actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  zizmor:
    name: Zizmor (Actions security)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install and run zizmor
        run: |
          pip install zizmor
          zizmor .github/workflows/


  pip-licenses:
    name: License compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Check licenses
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev
          uv run pip-licenses --allow-only "MIT;MIT License;DFSG approved; MIT License;BSD License;BSD-2-Clause;BSD-3-Clause;3-Clause BSD License;BSD-3-Clause AND 0BSD AND MIT AND Zlib AND CC0-1.0;Apache Software License;Apache Software License; BSD License;Apache Software License; MIT License;Apache-2.0;Apache-2.0 OR BSD-2-Clause;Apache-2.0 OR BSD-3-Clause;ISC License (ISCL);Python Software Foundation License;PSF-2.0;Mozilla Public License 2.0 (MPL 2.0);MPL-2.0;The Unlicense (Unlicense);CC0 1.0 Universal (CC0 1.0) Public Domain Dedication;Historical Permission Notice and Disclaimer (HPND);UNKNOWN;GNU Lesser General Public License v2 or later (LGPLv2+);GNU General Public License v3 or later (GPLv3+);GNU Affero General Public License v3"
