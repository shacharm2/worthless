name: Install Docker (bare-Ubuntu integration)

# Per-PR Docker integration test: validates that a fresh box without Python
# can install worthless via curl|sh in a hermetic environment (no
# Python/pipx/uv pre-installed). Slow (~3-5 min including image build +
# Python download), so it runs only when the installer or its fixtures change.

on:
  pull_request:
    paths:
      - "install.sh"
      - "tests/test_install_*.py"
      - "tests/_install_helpers.py"
      - "tests/install_fixtures/**"
      - ".github/workflows/install-docker.yml"
  push:
    branches:
      - main
    paths:
      - "install.sh"
      - "tests/test_install_*.py"
      - "tests/_install_helpers.py"
      - "tests/install_fixtures/**"
      - ".github/workflows/install-docker.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  install-matrix:
    name: install.sh host matrix (Ubuntu/Debian/Alpine, lock lifecycle)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python (pytest harness only; not used inside container)
        uses: ./.github/actions/setup-uv-python

      - name: Run docker-marked integration tests in parallel
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        # -n auto = xdist parallel across runner CPUs. Matrix has 7 docker tests
        # (~2-3 min each); sequential would exceed the 15-min default.
        run: |
          uv sync --extra test
          uv run pytest -m docker -q -n auto --dist loadscope tests/test_install_docker.py
