name: User-flow CI

on:
  pull_request:
    paths:
      - "tests/user_flows/**"
      - "src/worthless/cli/**"
      - "src/worthless/storage/**"
      - "src/worthless/crypto/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/actions/setup-uv-python/**"
      - ".github/workflows/user-flows.yml"
  push:
    branches:
      - "**"
    paths:
      - "tests/user_flows/**"
      - "src/worthless/cli/**"
      - "src/worthless/storage/**"
      - "src/worthless/crypto/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/actions/setup-uv-python/**"
      - ".github/workflows/user-flows.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  user-flows:
    name: User flows (${{ matrix.os }}, py3.13)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Run user-flow tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p user-flow-traces
          uv sync --extra dev --extra test
          uv run pytest tests/user_flows -m user_flow 2>&1 | tee user-flow-traces/pytest-${{ runner.os }}.log

      - name: Render terminal traces
        if: always()
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        shell: bash
        run: |
          set -euo pipefail
          uv run python tests/user_flows/render_traces.py \
            --output user-flow-traces/TERMINAL_TRACES-${{ runner.os }}.md

      - name: Upload terminal traces
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: user-flow-traces-${{ runner.os }}-${{ github.run_id }}
          path: user-flow-traces/**
          if-no-files-found: ignore
          retention-days: 14

  windows-deferred:
    name: Windows user flows deferred
    runs-on: windows-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Record deferred coverage
        shell: pwsh
        run: |
          "Windows native user-flow coverage is intentionally deferred for WOR-446 first pass."
          "This job does not claim WSL coverage."
