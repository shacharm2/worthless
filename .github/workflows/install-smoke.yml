name: Install Smoke (live curl|sh)

# Live install.sh smoke across the OS matrix we promise to support.
# Triggers only when install.sh, its tests, or this workflow change — keeps
# CI cheap. Pushes to a versioned worthless.sh blob still get manual smoke
# from MANUAL_SMOKE.md before we promote.

on:
  pull_request:
    paths:
      - "install.sh"
      - "tests/test_install_*.py"
      - "tests/_install_helpers.py"
      - "tests/install_fixtures/**"
      - ".github/workflows/install-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "install.sh"
      - "tests/test_install_*.py"
      - "tests/_install_helpers.py"
      - "tests/install_fixtures/**"
      - ".github/workflows/install-smoke.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static checks (set -eu, shellcheck, pinned versions)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Run install.sh static + shellcheck tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra test
          uv run pytest -q tests/test_install_static.py tests/test_install_shellcheck.py tests/test_install_logic.py

  live:
    name: Live install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    needs: static
    strategy:
      fail-fast: false
      matrix:
        # macos-15 = arm64 Sequoia; macos-14 = arm64 Sonoma.
        # (macos-13 was retired from GH runners.)
        # ubuntu-24.04 = current LTS; ubuntu-22.04 = previous LTS still in field.
        os:
          - macos-15
          - macos-14
          - ubuntu-24.04
          - ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Show runner platform
        run: |
          uname -a
          echo "SHELL=${SHELL:-unset}"
          if [ "$RUNNER_OS" = "macOS" ]; then sw_vers; fi
          if [ "$RUNNER_OS" = "Linux" ]; then ldd --version | head -1; fi

      - name: Run install.sh
        env:
          # Force the same managed-Python path real users get on a fresh box.
          UV_PYTHON_PREFERENCE: only-managed
        run: sh ./install.sh

      - name: Verify worthless is installed and runs
        run: |
          # PATH-independent — uv knows where it put the binary.
          uv run --no-project worthless --version
          # And via uv tool list (smoke that the tool is registered).
          uv tool list

      - name: Re-run install.sh — must be idempotent (upgrade path)
        env:
          UV_PYTHON_PREFERENCE: only-managed
        run: sh ./install.sh

  proxy:
    name: Behind a proxy (squid simulation)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: static
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Start local squid proxy
        run: |
          sudo apt-get update && sudo apt-get install -y squid
          sudo systemctl start squid
          # Give squid a beat to bind.
          for _ in 1 2 3 4 5; do
            if curl -fsS -x http://localhost:3128 https://astral.sh/ -o /dev/null; then
              echo "proxy reachable"; break
            fi
            sleep 2
          done

      - name: Run install.sh through proxy
        env:
          HTTPS_PROXY: http://localhost:3128
          HTTP_PROXY: http://localhost:3128
          UV_PYTHON_PREFERENCE: only-managed
        run: sh ./install.sh

      - name: Smoke worthless via proxy install
        env:
          HTTPS_PROXY: http://localhost:3128
          HTTP_PROXY: http://localhost:3128
        run: uv run --no-project worthless --version
