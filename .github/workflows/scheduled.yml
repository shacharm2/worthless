name: Scheduled (Mutation + Hypothesis)

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    name: Mutation testing (crypto)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run mutmut on crypto
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test --extra qa
          uv run python -m mutmut run --paths-to-mutate src/worthless/crypto --runner "uv run pytest tests/test_splitter.py tests/test_properties.py tests/test_security_properties.py -x --no-header -q"

  hypothesis-extended:
    name: Extended Hypothesis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run property tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
          HYPOTHESIS_PROFILE: ci
        run: |
          uv sync --extra dev --extra test
          uv run pytest tests/test_properties.py tests/test_security_properties.py -x --no-header -q -s

  contract:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run contract tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test --extra qa
          uv run pytest -m contract -x --no-header -q || true
