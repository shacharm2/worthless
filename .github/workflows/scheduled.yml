name: Scheduled (Mutation + Hypothesis + Secret Scan)

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    name: Mutation testing (crypto)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run mutmut on crypto
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test --extra qa
          uv run python -m mutmut run --paths-to-mutate src/worthless/crypto --runner "uv run pytest tests/test_splitter.py tests/test_properties.py tests/test_security_properties.py -x --no-header -q"

  hypothesis-extended:
    name: Extended Hypothesis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run property tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
          HYPOTHESIS_PROFILE: extended
        run: |
          uv sync --extra dev --extra test
          uv run pytest tests/test_properties.py tests/test_security_properties.py -x --no-header -q -s

  contract:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Run contract tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra dev --extra test --extra qa
          uv run pytest -m contract -x --no-header -q

  trufflehog:
    name: Secret scan (full history)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0  # full history required for git scan

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified
