# Snyk Open Source (SCA) scan — powers the vulnerability badge on README.
# Code/SAST, IaC, and container scans from the Snyk template were removed:
# Semgrep + Bandit + CodeQL already cover SAST, and we have no container
# registry targets to monitor.

name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
      # Uploads the project snapshot to Snyk.io so the README badge has data
      # to render. Non-fatal — badge should show current state even if a new
      # snapshot upload fails transiently.
      - name: Snyk Open Source monitor
        run: snyk monitor --all-projects
        continue-on-error: true
