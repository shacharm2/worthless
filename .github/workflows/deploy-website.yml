name: Deploy website

on:
  pull_request:
    paths:
      - "website/**"
      - "tests/test_website_publish_safety.py"
      - ".github/workflows/deploy-website.yml"
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "tests/test_website_publish_safety.py"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate static website files
        run: |
          test -f website/index.html
          test -f website/CNAME
          test -f website/robots.txt
          test -f website/sitemap.xml
          test -f website/llms.txt
          test -f website/features.html
          test -f website/how-it-works.html
          test -f website/coming-soon.html
          test -f website/memes.html
          test -f website/blog/index.html
          test -f website/.well-known/security.txt
          grep -qx 'wless.io' website/CNAME
          grep -qx 'Canonical: https://wless.io/.well-known/security.txt' website/.well-known/security.txt
          grep -qx 'Sitemap: https://wless.io/sitemap.xml' website/robots.txt

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Run website publish-safety tests
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: |
          uv sync --extra test
          uv run pytest -q tests/test_website_publish_safety.py

      - name: Upload website preview artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: website-preview
          path: website
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
