name: Docs spike (Starlight build)

on:
  push:
    branches: [feature/starlight-spike]
    paths:
      - 'docs/**'
      - 'src/content.config.ts'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-spike.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/content.config.ts'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: starlight-site
          path: dist/
          retention-days: 7
