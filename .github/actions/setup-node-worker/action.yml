name: Set up Node.js (worker workflows)
description: |
  Install Node.js at a pinned version with no npm cache. Cache is omitted
  because cache poisoning on a deploy workflow that publishes signed
  bytes is a real supply-chain risk; pay the ~10s install cost.

# Atomic SHA bumps: one edit here upgrades every workflow that consumes
# it. Checkout is NOT included — its options (persist-credentials,
# fetch-depth) vary per workflow and belong at the caller's step level.
# Mirrors the `setup-uv-python` pattern under .github/actions/.

inputs:
  node-version:
    description: Node.js major version to install.
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Set up Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
      with:
        node-version: ${{ inputs.node-version }}
