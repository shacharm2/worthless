# NOTE: Cloud deployment is planned but not yet streamlined.
# The container is self-contained but needs a persistent disk at /data.

services:
  - type: web
    name: worthless-proxy
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    envVars:
      # Render terminates TLS at its edge; the container sees plain HTTP.
      # `public` mode trusts X-Forwarded-Proto only from WORTHLESS_TRUSTED_PROXIES.
      - key: WORTHLESS_DEPLOY_MODE
        value: public
      # Operators MUST replace with the actual edge CIDR; empty refuses startup.
      - key: WORTHLESS_TRUSTED_PROXIES
        value: "REPLACE_WITH_EDGE_CIDR"
      # Render defaults to PORT=10000; override to match Dockerfile's 8787.
      - key: PORT
        value: "8787"
    disk:
      name: worthless-data
      mountPath: /data
      sizeGB: 1
