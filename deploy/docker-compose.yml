services:
  proxy:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      # Bind to localhost only; use a reverse proxy for external access
      - "127.0.0.1:8787:8787"
    env_file: docker-compose.env
    environment:
      # Separate fernet key from shard data — requires the worthless-secrets
      # volume below. Remove this for single-volume PaaS deployments.
      WORTHLESS_FERNET_KEY_PATH: /secrets/fernet.key
      # Redis hot-path metering is OPT-IN. Set WORTHLESS_REDIS_URL in
      # docker-compose.env to enable — e.g. redis://redis:6379/0. When unset,
      # the proxy uses SQLite-only metering (pre-Redis behaviour). The redis
      # service below starts regardless, so enabling later is a config flip
      # with no rebuild.
    volumes:
      - worthless-data:/data
      # Keeps the decryption key off the same volume as shard data.
      # Compromise of one volume alone cannot reconstruct API keys.
      - worthless-secrets:/secrets
    networks:
      # Frontend: ingress from the reverse proxy / host.
      - frontend
      # Backend: internal-only link to Redis; no external routing.
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    # No ports block: reachable only via the internal `backend` network.
    #
    # AUTH (worthless-c3ox): the ACL template is bind-mounted read-only.
    # Boot script renders __PASSWORD__ from $REDIS_PASSWORD into a tmpfs
    # copy at /tmp/users.acl, then execs redis-server with --aclfile.
    # We use `command:` (not `entrypoint:`) so the alpine image's
    # docker-entrypoint user-switching logic still runs.
    command:
      - sh
      - -c
      - |
        if [ -z "$$REDIS_PASSWORD" ]; then
          echo "FATAL: REDIS_PASSWORD env var is not set; refusing to start without AUTH"
          exit 1
        fi
        sed "s|__PASSWORD__|$$REDIS_PASSWORD|g" /etc/redis/users.acl.tmpl > /tmp/users.acl
        chmod 0400 /tmp/users.acl
        exec redis-server \
          --save "" \
          --appendonly no \
          --maxmemory 128mb \
          --maxmemory-policy noeviction \
          --aclfile /tmp/users.acl
    # Operator MUST set REDIS_PASSWORD in docker-compose.env. No
    # auto-generation: the password is shared between proxy and redis,
    # so generating one container-side desyncs from the proxy's
    # WORTHLESS_REDIS_PASSWORD. The boot script (above) is the
    # validation point — it exits with FATAL if REDIS_PASSWORD is
    # absent, before redis-server is exec'd.
    env_file: docker-compose.env
    volumes:
      # Read-only mount: ACL is immutable in this deploy. ACL SAVE will
      # fail (intentional — rotation requires a re-render).
      - ./redis-acl.conf.tmpl:/etc/redis/users.acl.tmpl:ro
    networks:
      - backend
    # Run as the built-in redis user (uid/gid 999 in redis:7-alpine).
    # When docker-entrypoint.sh detects a non-root uid it skips the chown
    # on /data, so we can cap_drop: ALL without breaking startup.
    user: "999:999"
    restart: unless-stopped
    read_only: true
    tmpfs:
      # writable-but-noexec; owned by uid/gid 999 so redis can write its
      # working files. No persistence flags are set in command, so nothing
      # important lives here beyond transient allocator state.
      - /data:noexec,nosuid,size=64m,uid=999,gid=999
      # /tmp is writable by uid 999 so the boot script can render the ACL.
      - /tmp:noexec,nosuid,size=8m,uid=999,gid=999
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Authenticated PING — without --user/-a, bare PING succeeds even
      # when ACL fails to load and default-user-on slips through. The
      # auth shape catches a malformed users.acl at startup.
      test:
        - CMD-SHELL
        - 'redis-cli --user worthless -a "$$REDIS_PASSWORD" --no-auth-warning PING | grep -q PONG'
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend:
    driver: bridge
  # Backend carries Redis/DB traffic only; `internal: true` blocks egress
  # so a compromised cache can't phone home.
  backend:
    driver: bridge
    internal: true

volumes:
  worthless-data:
  worthless-secrets:
