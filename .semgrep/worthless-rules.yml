rules:
  # SR-01: Key material must use bytearray, not bytes
  - id: sr01-key-material-not-bytearray
    patterns:
      - pattern: bytes($ARG)
      - metavariable-regex:
          metavariable: $ARG
          regex: ".*(shard|key|secret|material).*"
    message: >
      SR-01 violation: key material must be stored in a mutable bytearray
      so it can be securely zeroed after use. Replace bytes($ARG) with
      bytearray($ARG).
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-316: Cleartext Storage of Sensitive Information in Memory"

  # SR-07: Constant-time comparison required for MACs/digests
  - id: sr07-timing-safe-compare
    patterns:
      - pattern: $LEFT == $RIGHT
      - metavariable-regex:
          metavariable: $LEFT
          regex: ".*(mac|tag|digest|hmac).*"
    message: >
      SR-07 violation: use hmac.compare_digest() instead of == for
      comparing MACs, tags, or digests to prevent timing side-channels.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-208: Observable Timing Discrepancy"

  - id: sr07-timing-safe-compare-rhs
    patterns:
      - pattern: $LEFT == $RIGHT
      - metavariable-regex:
          metavariable: $RIGHT
          regex: ".*(mac|tag|digest|hmac).*"
    message: >
      SR-07 violation: use hmac.compare_digest() instead of == for
      comparing MACs, tags, or digests to prevent timing side-channels.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-208: Observable Timing Discrepancy"

  # SR-09: Proxy must never access shard-A files
  - id: sr09-no-shard-a-in-proxy
    pattern: $X.shard_a_dir
    paths:
      include:
        - "**/proxy/**"
    message: >
      SR-09 violation: the proxy must never access shard-A files.
      Shard-A arrives exclusively via the Authorization header per-request.
      Remove all shard_a_dir references from proxy code.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-522: Insufficiently Protected Credentials"

  - id: sr09-no-shard-a-dir-env-in-proxy
    pattern: '"WORTHLESS_SHARD_A_DIR"'
    paths:
      include:
        - "**/proxy/**"
    message: >
      SR-09 violation: the proxy must not receive or read
      WORTHLESS_SHARD_A_DIR. Shard-A must arrive via request header only.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-522: Insufficiently Protected Credentials"

  # SR-08: CSPRNG only — flag stdlib random in crypto files
  - id: sr08-no-weak-random
    pattern: random.$FUNC(...)
    paths:
      include:
        - "**/crypto/**"
        - "**/shard*"
        - "**/key*"
        - "**/secret*"
        - "**/encrypt*"
        - "**/decrypt*"
    message: >
      SR-08 violation: do not use the random module in cryptographic code.
      Use secrets or os.urandom() for cryptographically secure randomness.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-338: Use of Cryptographically Weak PRNG"

  # SC-01: Docker image must be pinned by digest, not just a mutable tag
  #
  # ELI5: A tag like `openclaw:2026.5.3-1` is a pointer. The registry owner
  # can silently push a different image to that tag — you pull "the same version"
  # and get different (potentially malicious) code. A sha256 digest is a
  # cryptographic hash of the exact bytes you're pulling; it's immutable. This
  # rule catches `image:` lines in docker-compose files that use a tag without
  # a digest. Dockerfiles (FROM) are caught by the second rule.
  - id: sc01-docker-compose-mutable-image-tag
    patterns:
      - pattern: |
          image: $IMAGE
      - pattern-not-regex: "image: .+@sha256:[a-f0-9]{64}"
    message: >
      SC-01: Docker image "$IMAGE" is pinned by mutable tag only. A tag can be
      silently repointed to a different image. Pin by digest:
      image: <name>:<tag>@sha256:<64-hex-chars>
      Get the digest with: docker buildx imagetools inspect <image>:<tag>
    languages: [yaml]
    severity: WARNING
    paths:
      include:
        - "**/docker-compose*.yml"
        - "**/compose*.yml"
    metadata:
      category: supply-chain
      cwe: "CWE-494: Download of Code Without Integrity Check"

  - id: sc01-dockerfile-mutable-from-tag
    patterns:
      - pattern: FROM $IMAGE
      - pattern-not-regex: "FROM .+@sha256:[a-f0-9]{64}"
      - pattern-not-regex: "FROM scratch"
    message: >
      SC-01: Dockerfile FROM "$IMAGE" uses a mutable tag without a digest.
      Pin by digest: FROM <name>:<tag>@sha256:<64-hex-chars>
      Get the digest with: docker buildx imagetools inspect <image>:<tag>
    languages: [dockerfile]
    severity: WARNING
    metadata:
      category: supply-chain
      cwe: "CWE-494: Download of Code Without Integrity Check"
