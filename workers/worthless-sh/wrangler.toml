name = "worthless-sh"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Text rules: bundle install.sh and walkthrough.txt as string exports at
# build time. The Worker holds the canonical bytes inline (Option A — see
# engineering/adr/001-worthless-sh-inline-bundle.md). No runtime fetch from
# GitHub; the only way to change what `curl worthless.sh | sh` serves is to
# ship a new Worker (gated by signed tags + protected ruleset, WOR-323).
[[rules]]
type = "Text"
globs = ["**/*.sh", "**/*.txt"]
fallthrough = true

[vars]
# Browser fail-safe redirect target. Read by Worker code AND by tests
# (`_helpers.ts` exposes it as `REDIRECT_URL`).
REDIRECT_URL = "https://wless.io"
# Verifiability metadata stamped into response headers
# `X-Worthless-Script-Tag` and `X-Worthless-Script-Commit`. The deploy
# pipeline (Phase 5 / WOR-323) overrides these per release.
SCRIPT_TAG = "v0.0.0-dev"
SCRIPT_COMMIT = "0000000000000000000000000000000000000000"

# --- Deploy environments ----------------------------------------------------
#
# Two named environments. Tests run against the bare `[vars]` block above
# (cloudflareTest reads it directly). `wrangler deploy --env preview` /
# `--env production` pick the matching block below.
#
# Preview is a workers.dev-only deploy (no route) — used by the
# deploy-worker workflow's workflow_dispatch path so we can validate the
# build artifact end-to-end before tagging a release. Routes attached only
# to production.

[env.preview]
name = "worthless-sh-preview"

[env.preview.vars]
REDIRECT_URL = "https://wless.io"
SCRIPT_TAG = "preview"
SCRIPT_COMMIT = "preview"

[env.production]
name = "worthless-sh"

[env.production.vars]
REDIRECT_URL = "https://wless.io"
# SCRIPT_TAG and SCRIPT_COMMIT are injected at deploy time by the
# .github/workflows/deploy-worker.yml workflow via `wrangler deploy --var`.

# Production route — wired in WOR-300 when DNS is live (WOR-323 hardening
# blocks the first production tag push; uncomment after that lands).
# [[env.production.routes]]
# pattern = "worthless.sh/*"
# zone_name = "worthless.sh"
