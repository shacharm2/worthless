# Post-install lock-lifecycle stack: mock-upstream (fake OpenAI) + a
# container that has worthless installed via install.sh. The worthless
# container runs lock_e2e.py which locks a fake key, starts the proxy,
# sends a request, and asserts mock-upstream received the reconstructed
# real key. See tests/test_install_docker.py :: test_bare_ubuntu_lock_*.
services:
  mock-upstream:
    build:
      context: ../openclaw/mock-upstream
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9999/healthz')",
        ]
      interval: 3s
      timeout: 3s
      start_period: 2s
      retries: 5
    networks:
      - lock-e2e-net

  worthless-installed:
    build:
      context: ../..
      dockerfile: tests/install_fixtures/Dockerfile.ubuntu-bare-lock-e2e
    environment:
      # Point the proxy at the fake upstream instead of api.openai.com.
      WORTHLESS_UPSTREAM_OPENAI_URL: "http://mock-upstream:9999/v1/chat/completions"
      # Allow http:// upstream — required to hit mock-upstream without TLS.
      WORTHLESS_ALLOW_INSECURE: "true"
    depends_on:
      mock-upstream:
        condition: service_healthy
    networks:
      - lock-e2e-net

networks:
  lock-e2e-net:
    driver: bridge
