# Debian 12 variant of docker-compose.lock-e2e.yml. Swaps the worthless
# image for the Debian-based fixture. Everything else (mock-upstream,
# network, env vars) is identical to Ubuntu — the point is to prove the
# lock lifecycle holds on a second glibc distro.
services:
  mock-upstream:
    build:
      context: ../openclaw/mock-upstream
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9999/healthz')",
        ]
      interval: 3s
      timeout: 3s
      start_period: 2s
      retries: 5
    networks:
      - lock-e2e-net

  worthless-installed:
    build:
      context: ../..
      dockerfile: tests/install_fixtures/Dockerfile.debian-12-lock-e2e
    environment:
      WORTHLESS_UPSTREAM_OPENAI_URL: "http://mock-upstream:9999/v1/chat/completions"
      WORTHLESS_ALLOW_INSECURE: "true"
    depends_on:
      mock-upstream:
        condition: service_healthy
    networks:
      - lock-e2e-net

networks:
  lock-e2e-net:
    driver: bridge
