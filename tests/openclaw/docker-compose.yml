services:
  mock-upstream:
    build:
      context: ./mock-upstream
    ports:
      - "127.0.0.1::9999"
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/healthz')"]
      interval: 5s
      timeout: 3s
      start_period: 2s
      retries: 3
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  worthless-proxy:
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1::8787"
    environment:
      WORTHLESS_ALLOW_INSECURE: "true"
      WORTHLESS_UPSTREAM_OPENAI_URL: "http://mock-upstream:9999/v1/chat/completions"
      WORTHLESS_UPSTREAM_ANTHROPIC_URL: "http://mock-upstream:9999/v1/messages"
      WORTHLESS_FERNET_KEY_PATH: /secrets/fernet.key
    volumes:
      - worthless-data:/data
      - worthless-secrets:/secrets
    networks:
      - openclaw-net
    depends_on:
      mock-upstream:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # OpenClaw Gateway — opt-in via: docker compose --profile openclaw up
  # Requires ghcr.io/openclaw/openclaw:latest to be pullable.
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    profiles:
      - openclaw
    ports:
      - "127.0.0.1::18789"
    environment:
      OPENCLAW_ACCEPT_TERMS: "yes"
    volumes:
      - ./openclaw-config:/home/node/.openclaw
    networks:
      - openclaw-net
    depends_on:
      worthless-proxy:
        condition: service_healthy

networks:
  openclaw-net:
    driver: bridge

volumes:
  worthless-data:
  worthless-secrets:
