<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found · Worthless</title>
  <meta name="description" content="Page not found on wless.io." />
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://wless.io/" />
  <meta name="theme-color" content="#4a6fa5" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #eef6ff;
      --surface: #ffffff;
      --border: #dde5f0;
      --slate: #4a6fa5;
      --slate-dim: #3a5a8a;
      --text: #2c3a4a;
      --text2: #6c7e95;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.5;
    }
    main {
      max-width: 32rem;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .code {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--slate-dim);
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 0.75rem; }
    p { color: var(--text2); margin-bottom: 1.75rem; }
    nav { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    a {
      display: inline-block;
      padding: 0.6rem 1.1rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.05s ease;
    }
    a.primary { background: var(--slate); color: #fff; }
    a.primary:hover { background: var(--slate-dim); }
    a.ghost { background: transparent; color: var(--slate); border: 1px solid var(--border); }
    a.ghost:hover { border-color: var(--slate); }
    a:active { transform: translateY(1px); }
  </style>
</head>

<body>
  <main>
    <div class="code">HTTP 404</div>
    <h1>That page isn't here.</h1>
    <p>The link may be stale, or the page has moved. Worthless itself is still live and your keys are still useless to attackers.</p>
    <nav>
      <a class="primary" href="/">Back home</a>
      <a class="ghost" href="/install">Install</a>
      <a class="ghost" href="/how-it-works">How it works</a>
    </nav>
  </main>
</body>

</html>
